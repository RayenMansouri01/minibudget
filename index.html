<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniBudget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 24px; font-weight: 600; }
  h1 span { font-size: 14px; font-weight: 400; color: #888; margin-left: 8px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 1.25rem 0; }
  .stat { background: #fff; border: 1px solid #e5e5e3; border-radius: 10px; padding: 12px 14px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stat-value.danger { color: #c0392b; }

  /* Alert */
  .alert { display: none; background: #fdecea; border: 1px solid #f5c6c6; border-radius: 10px;
           padding: 10px 14px; font-size: 13px; color: #c0392b; margin-bottom: 1rem; }

  /* Form */
  .form-card { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px;
               padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  .field label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; height: 36px; padding: 0 10px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; background: #fafafa; color: #1a1a1a;
    outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: #888; background: #fff; }
  .btn-add {
    height: 36px; padding: 0 18px; background: #1a1a1a; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; white-space: nowrap;
  }
  .btn-add:hover { opacity: .85; }
  .budget-row { display: flex; align-items: center; gap: 10px; margin-top: 10px;
                padding-top: 10px; border-top: 1px solid #eee; }
  .budget-row label { font-size: 12px; color: #888; white-space: nowrap; }
  .budget-row input {
    flex: 1; height: 36px; padding: 0 10px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; background: #fafafa; color: #1a1a1a; outline: none;
  }
  .budget-row input:focus { border-color: #888; background: #fff; }

  /* List */
  .list-header { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; }
  .expense-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #fff;
    border: 1px solid #e5e5e3; border-radius: 10px; margin-bottom: 6px;
  }
  .expense-left { display: flex; align-items: center; gap: 10px; }
  .cat-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .expense-desc { font-size: 14px; color: #1a1a1a; }
  .expense-date { font-size: 12px; color: #aaa; }
  .expense-right { display: flex; align-items: center; gap: 12px; }
  .expense-amount { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .btn-del {
    background: none; border: none; cursor: pointer;
    color: #bbb; font-size: 14px; padding: 2px 6px; border-radius: 4px;
  }
  .btn-del:hover { color: #c0392b; }
  .empty { text-align: center; color: #aaa; font-size: 14px; padding: 2rem 0; }

  /* By category */
  .by-cat { background: #fff; border: 1px solid #e5e5e3; border-radius: 12px;
            padding: 1rem 1.25rem; margin-top: 1.25rem; display: none; }
  .by-cat h3 { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cat-row-label { font-size: 13px; color: #1a1a1a; width: 110px; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; height: 8px; background: #f0f0ee; border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width .3s; }
  .cat-row-amt { font-size: 13px; color: #888; width: 80px; text-align: right; flex-shrink: 0; }

  @media(max-width: 500px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>MiniBudget <span>Gestion des dépenses personnelles</span></h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total dépenses</div>
      <div class="stat-value" id="stat-total">0,00 TND</div>
    </div>
    <div class="stat">
      <div class="stat-label">Budget fixé</div>
      <div class="stat-value" id="stat-budget">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Restant</div>
      <div class="stat-value" id="stat-remaining">—</div>
    </div>
  </div>

  <div class="alert" id="alert-box">
    ⚠️ Budget dépassé ! Vos dépenses excèdent le budget fixé.
  </div>

  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Description</label>
        <input type="text" id="inp-desc" placeholder="ex: Courses" />
      </div>
      <div class="field">
        <label>Montant (TND)</label>
        <input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="field">
        <label>Catégorie</label>
        <select id="inp-cat">
          <option>Alimentation</option>
          <option>Transport</option>
          <option>Logement</option>
          <option>Santé</option>
          <option>Loisirs</option>
          <option>Éducation</option>
          <option>Autre</option>
        </select>
      </div>
      <button class="btn-add" onclick="addExpense()">+ Ajouter</button>
    </div>
    <div class="budget-row">
      <label>Budget mensuel (TND)</label>
      <input type="number" id="inp-budget" placeholder="ex: 1000" min="0" step="1" oninput="saveBudget()" />
    </div>
  </div>

  <div class="list-header">Dépenses</div>
  <div id="expense-list"></div>

  <div class="by-cat" id="by-cat">
    <h3>Total par catégorie</h3>
    <div id="cat-rows"></div>
  </div>
</div>

<script>
const CAT_COLORS = {
  "Alimentation": { bg:"#EAF3DE", text:"#3B6D11", bar:"#639922" },
  "Transport":    { bg:"#E6F1FB", text:"#185FA5", bar:"#378ADD" },
  "Logement":     { bg:"#EEEDFE", text:"#3C3489", bar:"#7F77DD" },
  "Santé":        { bg:"#E1F5EE", text:"#0F6E56", bar:"#1D9E75" },
  "Loisirs":      { bg:"#FBEAF0", text:"#72243E", bar:"#D4537E" },
  "Éducation":    { bg:"#FAEEDA", text:"#854F0B", bar:"#BA7517" },
  "Autre":        { bg:"#F1EFE8", text:"#5F5E5A", bar:"#888780" },
};

let expenses = [];
let budget = 0;

function load() {
  try { expenses = JSON.parse(localStorage.getItem("mb_expenses") || "[]"); } catch(e) { expenses = []; }
  budget = parseFloat(localStorage.getItem("mb_budget") || "0");
  if (budget > 0) document.getElementById("inp-budget").value = budget;
  render();
}

function save() {
  localStorage.setItem("mb_expenses", JSON.stringify(expenses));
}

function saveBudget() {
  budget = parseFloat(document.getElementById("inp-budget").value) || 0;
  localStorage.setItem("mb_budget", budget.toString());
  render();
}

function addExpense() {
  const desc   = document.getElementById("inp-desc").value.trim();
  const amount = parseFloat(document.getElementById("inp-amount").value);
  const cat    = document.getElementById("inp-cat").value;
  if (!desc || isNaN(amount) || amount <= 0) {
    document.getElementById("inp-desc").focus();
    return;
  }
  expenses.unshift({
    id: Date.now(), desc, amount, cat,
    date: new Date().toLocaleDateString("fr-TN")
  });
  document.getElementById("inp-desc").value   = "";
  document.getElementById("inp-amount").value = "";
  save();
  render();
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  save();
  render();
}

function fmt(n) {
  return n.toLocaleString("fr-TN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TND";
}

function render() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById("stat-total").textContent = fmt(total);

  const statBudget = document.getElementById("stat-budget");
  const statRem    = document.getElementById("stat-remaining");
  const alertBox   = document.getElementById("alert-box");

  if (budget > 0) {
    statBudget.textContent = fmt(budget);
    const rem = budget - total;
    statRem.textContent = (rem < 0 ? "-" : "") + fmt(Math.abs(rem));
    statRem.className   = "stat-value" + (rem < 0 ? " danger" : "");
    alertBox.style.display = rem < 0 ? "block" : "none";
  } else {
    statBudget.textContent = "—";
    statRem.textContent    = "—";
    statRem.className      = "stat-value";
    alertBox.style.display = "none";
  }

  const list = document.getElementById("expense-list");
  if (expenses.length === 0) {
    list.innerHTML = '<div class="empty">Aucune dépense enregistrée. Ajoutez-en une ci-dessus.</div>';
    document.getElementById("by-cat").style.display = "none";
    return;
  }

  list.innerHTML = expenses.map(e => {
    const c = CAT_COLORS[e.cat] || CAT_COLORS["Autre"];
    return `<div class="expense-item">
      <div class="expense-left">
        <span class="cat-badge" style="background:${c.bg};color:${c.text}">${e.cat}</span>
        <div>
          <div class="expense-desc">${e.desc}</div>
          <div class="expense-date">${e.date}</div>
        </div>
      </div>
      <div class="expense-right">
        <span class="expense-amount">${fmt(e.amount)}</span>
        <button class="btn-del" onclick="deleteExpense(${e.id})" title="Supprimer">✕</button>
      </div>
    </div>`;
  }).join("");

  const bycat = {};
  expenses.forEach(e => { bycat[e.cat] = (bycat[e.cat] || 0) + e.amount; });
  const maxAmt = Math.max(...Object.values(bycat));
  const bycatEl = document.getElementById("by-cat");
  bycatEl.style.display = "block";
  document.getElementById("cat-rows").innerHTML = Object.entries(bycat)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) => {
      const c   = CAT_COLORS[cat] || CAT_COLORS["Autre"];
      const pct = maxAmt > 0 ? Math.round((amt / maxAmt) * 100) : 0;
      return `<div class="cat-row">
        <span class="cat-row-label">${cat}</span>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:${c.bar}"></div></div>
        <span class="cat-row-amt">${fmt(amt)}</span>
      </div>`;
    }).join("");
}

load();
</script>
</body>
</html>
